name: Build advmame.64

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Target Commit Hash'
        required: true
        default: 'master'

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/advmame-builder-64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.64
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache,mode=max

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ccache
          key: advmame-ccache-${{ github.run_id }}
          restore-keys: |
            advmame-ccache-

      - name: Execute Build and Prepare Output
        env:
          COMMIT_HASH: ${{ github.event.inputs.commit_hash }}
        run: |
          mkdir -p output ccache
          chmod -R 777 output ccache
          
          # Use /bin/bash to explicitly grant permission and execute
          docker run --rm \
            -e COMMIT_HASH=${COMMIT_HASH} \
            -v ${{ github.workspace }}/output:/output \
            -v ${{ github.workspace }}/ccache:/ccache \
            ${{ env.IMAGE }}:latest /bin/bash -c "chmod +x /build-64.sh && /build-64.sh"

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ccache
          key: advmame-ccache-${{ github.run_id }}

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "latest" >/dev/null 2>&1 || \
          gh release create "latest" --title "Latest Build" --notes "AdvanceMAME CI Build" || true
          
          if [ -f output/advmame.64.7z ]; then
            gh release upload "latest" output/advmame.64.7z --clobber
          else
            echo "Error: output/advmame.64.7z not found!"
            exit 1
          fi
